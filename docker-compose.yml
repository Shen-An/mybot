services:
  countbot:
    container_name: countbot
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: "host"
    volumes:
      # SQLite 数据库 + 日志（持久化，容器重建不丢失）
      - ./data:/app/data
      # 用户工作区（技能、记忆、wiki、上传文件等）
      - ./workspace:/app/workspace
    environment:
      - COUNTBOT_HOST=0.0.0.0
      - COUNTBOT_PORT=7000
      - TZ=Asia/Shanghai
      # ── 以下按需取消注释 ──
      # - COUNTBOT_SECRET_KEY=your-secret-key-here  # 会话加密密钥
      # - REMOTE_SETUP_SECRET_TTL_MINUTES=30         # 远程设置密钥有效期（分钟）
    restart: unless-stopped
    # 限制资源（甲骨文 1c6g）
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "4g"
        reservations:
          memory: "256m"
